# ─────────────────────────────────────────────────────────────────────────────
# Browserless + Login Station — docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
#
# Two modes:
#
#   LOCAL DEV  (USE_SSL=false, default)
#     → No SSL/TLS, no nginx. Direct HTTP access via localhost.
#     → Browserless: http://127.0.0.1:3000
#     → Login UI:   http://127.0.0.1:3100
#     → Scrape API: http://127.0.0.1:3100/scrape
#
#   PRODUCTION (USE_SSL=true)
#     → nginx reverse proxy with TLS termination
#     → Configure DOMAIN + SSL_CERT_PATH + SSL_KEY_PATH in .env
#     → Routes: https://login.DOMAIN, https://scrape.DOMAIN,
#               https://browserless.DOMAIN
#
# Usage:
#   cp .env.example .env
#   # Edit .env — set USE_SSL=true and fill in DOMAIN/SSL paths for prod
#   docker compose up -d
#   # Open http://127.0.0.1:3100 → sign into any site via KasmVNC
#   # Then use browserless at http://127.0.0.1:3000 with Playwright/MCP
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Browserless (Headless Chrome API) ───────────────────────────────────
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless
    restart: unless-stopped

    # Always expose on localhost — direct HTTP when no SSL,
    # or as upstream for nginx when SSL is active
    ports:
      - "${BROWSERLESS_HOST_PORT:-127.0.0.1:3000}:3000"

    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - TOKEN=${BROWSERLESS_TOKEN:-}

      # CDP WebSocket endpoint — inherits sessions from login-station Chrome
      # Protocol switches between ws:// (local) and wss:// (SSL/production)
      - CONNECTION_WS_ENDPOINT=${CONNECTION_WS_ENDPOINT:-ws://login-station:9224/}

      # External URL — tells browserless its public facing URL
      - EXTERNAL=${BROWSERLESS_EXTERNAL_URL:-http://127.0.0.1:3000}

      # Session limits
      - CONCURRENT=${BROWSERLESS_CONCURRENT:-5}
      - MAX_CONCURRENT_SESSIONS=${BROWSERLESS_MAX_SESSIONS:-5}
      - QUEUED=${BROWSERLESS_QUEUED:-10}
      - MAX_QUEUE_LENGTH=${BROWSERLESS_MAX_QUEUE:-10}
      - TIMEOUT=${BROWSERLESS_TIMEOUT:-600000}

      # Keep Chrome alive between requests for faster reuse
      - KEEP_ALIVE=true
      - CHROME_REFRESH_TIME=3600000

      # Health checks
      - HEALTH=true
      - PRE_REQUEST_HEALTH_CHECK=true

      # Resource limits
      - MAX_MEMORY_PERCENT=${BROWSERLESS_MAX_MEMORY:-80}
      - MAX_CPU_PERCENT=${BROWSERLESS_MAX_CPU:-80}

      # Directories
      - DOWNLOAD_DIR=/downloads
      - DATA_DIR=/user_data

      # Logging
      - LOG_LEVEL=info
      - DEBUG=browserless*,-**:verbose

    volumes:
      - browserless_downloads:/downloads
      - browserless_data:/user_data

    networks:
      - login-station-net

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

    cap_add:
      - SYS_ADMIN

    shm_size: 1gb

    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/3000' && exit 0 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s


  # ── Login Station (KasmVNC + auth-proxy) ─────────────────────────────────
  login-station:
    # Build args for OCI image labels (used by CI when pushing to GHCR)
    build:
      context: .
      dockerfile: Dockerfile.login-station
      args:
        - BUILD_DATE=${BUILD_DATE:-unknown}
        - VCS_REF=${VCS_REF:-local}
        - GITHUB_REPO=${GITHUB_REPO:-local}
    # To use a pre-built image from GHCR instead of building locally, comment out
    # the build: block above and uncomment this line (fill in your details):
    # image: ghcr.io/YOUR_HANDLE/browserless-login-station:latest
    container_name: login-station
    restart: unless-stopped

    ports:
      # Auth-proxy scrape API + KasmVNC web UI (same port inside container)
      - "${AUTH_PROXY_HOST_PORT:-127.0.0.1:3100}:3100"
      # CDP WebSocket proxy — browserless connects here for session inheritance
      - "${CDP_HOST_PORT:-127.0.0.1:9224}:9224"

    environment:
      # Linuxserver/Chromium standard vars
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - TITLE=${LOGIN_STATION_TITLE:-Browserless Login Station}
      - CHROME_CLI=--disable-gpu --window-size=${DISPLAY_WIDTH:-1920},${DISPLAY_HEIGHT:-1080} --remote-debugging-port=9222 --remote-debugging-address=0.0.0.0
      - DISPLAY_WIDTH=${DISPLAY_WIDTH:-1920}
      - DISPLAY_HEIGHT=${DISPLAY_HEIGHT:-1080}
      - DISPLAY_REFRESH=${DISPLAY_REFRESH:-60}
      - DARK_MODE=${DARK_MODE:-true}

      # Auth-proxy port (matches s6 service env)
      - AUTH_PROXY_PORT=3100

      # URL scheme for auth-proxy's response headers (http or https)
      - PUBLIC_URL_SCHEME=${PUBLIC_URL_SCHEME:-http}

    volumes:
      - login_station_config:/config
      - /dev/shm:/dev/shm

    networks:
      - login-station-net

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

    shm_size: 1gb
    security_opt:
      - seccomp:unconfined
    group_add:
      - "105"


  # ── Nginx reverse proxy (production only) ───────────────────────────────
  # Only started when USE_SSL=true. Start with:
  #   docker compose --profile ssl up -d
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    profiles:
      - ssl

    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"

    environment:
      - USE_SSL=${USE_SSL:-false}
      - LOGIN_DOMAIN=${LOGIN_DOMAIN:-login.localhost}
      - SCRAPE_DOMAIN=${SCRAPE_DOMAIN:-scrape.localhost}
      - BROWSERLESS_DOMAIN=${BROWSERLESS_DOMAIN:-browserless.localhost}
      - SSL_CERT_PATH=${SSL_CERT_PATH:-}
      - SSL_KEY_PATH=${SSL_KEY_PATH:-}
      - KASMVNC_PORT=${KASMVNC_PORT:-3100}
      - AUTH_PROXY_PORT=${AUTH_PROXY_PORT:-3100}
      - BROWSERLESS_PORT=${BROWSERLESS_PORT:-3000}

    volumes:
      - ./nginx/nginx.conf.http:/etc/nginx/nginx.conf.http:ro
      - ./nginx/nginx.conf.https:/etc/nginx/nginx.conf.https:ro
      - ./nginx/proxy-headers.conf:/etc/nginx/proxy-headers.conf:ro
      - ./setup.sh:/setup.sh:ro
      # Mount SSL certificates if USE_SSL=true
      ${SSL_CERT_MOUNT:-}
      ${SSL_KEY_MOUNT:-}

    entrypoint: ["/setup.sh"]
    depends_on:
      login-station:
        condition: service_started
      browserless:
        condition: service_started

    networks:
      - login-station-net

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"


networks:
  # Internal bridge network — all containers communicate over this.
  # No external network dependency.
  login-station-net:
    driver: bridge


volumes:
  browserless_downloads:
  browserless_data:
  login_station_config: