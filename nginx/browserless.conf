# Nginx config for Browserless headless API
# ─────────────────────────────────────────────────────────────────────────────
# Route: browserless.YOUR_DOMAIN → browserless:3000 (internal Docker port)
#
# SETUP
# ─────
# 1. Copy this file to your nginx-proxy conf.d/ directory
# 2. Replace YOUR_DOMAIN and SSL_CERT_PATH placeholders below
# 3. Generate SSL cert (e.g. Let's Encrypt with DNS-01 challenge)
# 4. Add the volume mounts for the cert to your nginx docker-compose.yml:
#      - /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem:/etc/ssl/certs/browserless-fullchain.pem:ro
#      - /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem:/etc/ssl/private/browserless-privkey.pem:ro
# 5. docker compose -f nginx-proxy/docker-compose.yml restart nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name  browserless.YOUR_DOMAIN;

    # Redirect HTTP → HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name  browserless.YOUR_DOMAIN;

    # ── SSL ────────────────────────────────────────────────────────────────
    # Update these paths to match where your SSL certs are mounted
    ssl_certificate     /path/to/your/certs/browserless.YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /path/to/your/certs/browserless.YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options   "nosniff"                               always;
    add_header X-XSS-Protection         "1; mode=block"                          always;

    # ── Docker DNS resolver (required for $variable upstream pattern) ────────
    resolver 127.0.0.11 valid=30s;

    # ── Request limits ───────────────────────────────────────────────────────
    # Larger limit for PDF generation and screenshot downloads
    client_max_body_size 100M;

    # ── Proxy headers ───────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # ── WebSocket support (Playwright MCP / browser clients) ───────────────
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ── Timeouts (Browserless sessions can be long-running) ─────────────────
    proxy_connect_timeout 600s;
    proxy_send_timeout     600s;
    proxy_read_timeout     600s;

    # ── Proxy to Browserless container ─────────────────────────────────────
    location / {
        set $upstream_service browserless:3000;
        proxy_pass http://$upstream_service;
    }
}