# Nginx config for Login Station (KasmVNC + auth-proxy scrape API)
# ─────────────────────────────────────────────────────────────────────────────
# Routes two subdomains to the same login-station container:
#   login.YOUR_DOMAIN  → KasmVNC web interface (port 3100)
#   scrape.YOUR_DOMAIN → Auth-proxy scrape API  (port 3100)
#
# SETUP
# ─────
# 1. Copy this file to your nginx-proxy conf.d/ directory
# 2. Replace YOUR_DOMAIN and SSL_CERT_PATH placeholders below
# 3. Generate SSL certs for BOTH subdomains
# 4. Add cert volume mounts to your nginx docker-compose.yml:
#      - /etc/letsencrypt/live/login.YOUR_DOMAIN/fullchain.pem:/etc/ssl/certs/login-browserless-fullchain.pem:ro
#      - /etc/letsencrypt/live/login.YOUR_DOMAIN/privkey.pem:/etc/ssl/certs/login-browserless-privkey.pem:ro
#      - /etc/letsencrypt/live/scrape.YOUR_DOMAIN/fullchain.pem:/etc/ssl/certs/scrape-browserless-fullchain.pem:ro
#      - /etc/letsencrypt/live/scrape.YOUR_DOMAIN/privkey.pem:/etc/ssl/certs/scrape-browserless-privkey.pem:ro
# 5. docker compose -f nginx-proxy/docker-compose.yml restart nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── login.YOUR_DOMAIN — KasmVNC web interface ──────────────────────────────
server {
    listen 80;
    server_name  login.YOUR_DOMAIN;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name  login.YOUR_DOMAIN;

    # ── SSL ────────────────────────────────────────────────────────────────
    ssl_certificate     /path/to/your/certs/login.YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /path/to/your/certs/login.YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options   "nosniff"                               always;
    add_header X-XSS-Protection         "1; mode=block"                          always;

    # ── Docker DNS ─────────────────────────────────────────────────────────
    resolver 127.0.0.11 valid=30s;

    client_max_body_size 50M;

    # ── Proxy headers ───────────────────────────────────────────────────────
    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # ── WebSocket (KasmVNC uses WS for browser control) ─────────────────────
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    location / {
        set $upstream_service login-station:3100;
        proxy_pass http://$upstream_service;
    }
}

# ── scrape.YOUR_DOMAIN — Authenticated scrape REST API ───────────────────
server {
    listen 80;
    server_name  scrape.YOUR_DOMAIN;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name  scrape.YOUR_DOMAIN;

    # ── SSL ────────────────────────────────────────────────────────────────
    ssl_certificate     /path/to/your/certs/scrape.YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /path/to/your/certs/scrape.YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options   "nosniff"                               always;
    add_header X-XSS-Protection         "1; mode=block"                          always;

    # ── Docker DNS ─────────────────────────────────────────────────────────
    resolver 127.0.0.11 valid=30s;

    # ── Proxy headers ───────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port   $server_port;

    location / {
        set $upstream_service login-station:3100;
        proxy_pass http://$upstream_service;
    }
}